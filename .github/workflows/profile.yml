name: Profile

on:
  workflow_dispatch:
    inputs:
      bench:
        description: "Benchmark to profile (e.g. ycsb, throughput)"
        required: true
        default: "ycsb"
      filter:
        description: "Benchmark filter (e.g. ycsb-a)"
        required: false
        default: ""

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_BENCH_DEBUG: true

jobs:
  flamegraph:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install perf and flamegraph
      run: |
        sudo apt-get update
        sudo apt-get install -y linux-tools-common linux-tools-generic linux-tools-$(uname -r) linux-tools-azure linux-cloud-tools-azure || true
        cargo install flamegraph

    - name: Allow perf for unprivileged users
      run: echo -1 | sudo tee /proc/sys/kernel/perf_event_paranoid

    - name: Run flamegraph
      run: |
        FILTER="${{ github.event.inputs.filter }}"
        if [ -n "$FILTER" ]; then
          cargo flamegraph --bench ${{ github.event.inputs.bench }} -o flamegraph.svg -- --bench "$FILTER"
        else
          cargo flamegraph --bench ${{ github.event.inputs.bench }} -o flamegraph.svg
        fi

    - name: Upload flamegraph
      uses: actions/upload-artifact@v4
      with:
        name: flamegraph
        path: flamegraph.svg
