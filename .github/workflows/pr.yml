name: Test before pull request

on:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Coverage Tool
      run: cargo install cargo-llvm-cov
    - name: Run tests
      run: cargo test:cov
